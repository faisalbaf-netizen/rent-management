<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zahida Kanon Rent Management</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 10px; background: #f0f2f5; }
        .container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 1000px; margin: auto; }
        h2 { color: #1a73e8; text-align: center; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { background: #1a73e8; color: white; padding: 10px; }
        td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        input { width: 65px; border: 1px solid #ccc; border-radius: 4px; padding: 4px; text-align: center; }
        .summary-section { margin-top: 20px; background: #e8f0fe; padding: 15px; border-radius: 8px; }
        .total-row { font-weight: bold; background: #f8f9fa; }
        .btn-submit { background: #188038; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Rent Management Portal</h2>
        <div style="text-align: center; margin-bottom: 15px;">
            Month: <input type="month" id="reportMonth" style="width: 150px;">
        </div>
        
        <table id="rentTable">
            <thead>
                <tr>
                    <th>Flat</th>
                    <th>Prev. Due</th>
                    <th>Rent</th>
                    <th>Bills</th>
                    <th>Others</th>
                    <th>Total Powna</th>
                    <th>Paid</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>

        <div class="summary-section">
            <h3 style="margin-top:0;">Monthly Expenditures</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div>Guard: <input type="number" id="expGuard" value="0" oninput="calcFinal()"></div>
                <div>Mosque: <input type="number" id="expMosque" value="0" oninput="calcFinal()"></div>
                <div>Repair: <input type="number" id="expRepair" value="0" oninput="calcFinal()"></div>
            </div>
            <hr>
            <div style="font-size: 18px; text-align: right;">
                <strong>Total Turnover: <span id="finalTurnover" style="color: #d93025;">0</span> BDT</strong>
            </div>
        </div>

        <button class="btn-submit" onclick="exportData()">Generate Monthly Report (CSV)</button>
    </div>

    <script>
        // Data from your RentMS.xlsm 
        const flatData = [
            { id: 1, prev: 15350, rent: 5800, bill: 1580 },
            { id: 2, prev: 13670, rent: 8000, bill: 1580 },
            { id: 3, prev: 0, rent: 8500, bill: 2080 },
            { id: 4, prev: 0, rent: 11000, bill: 1580 },
            { id: 5, prev: 9450, rent: 6500, bill: 2300 },
            { id: 6, prev: 0, rent: 9000, bill: 2520 },
            { id: 7, prev: 0, rent: 7000, bill: 1580 },
            { id: 8, prev: 0, rent: 7500, bill: 1580 },
            { id: 9, prev: 0, rent: 8000, bill: 1580 },
            { id: 10, prev: 0, rent: 8000, bill: 1580 },
            { id: 11, prev: 0, rent: 8000, bill: 1580 },
            { id: 12, prev: 0, rent: 8000, bill: 1580 },
            { id: 13, prev: 0, rent: 8000, bill: 1580 },
            { id: 14, prev: 0, rent: 8000, bill: 1580 }
        ];

        function initTable() {
            const body = document.getElementById('tableBody');
            flatData.forEach((flat, i) => {
                const row = `<tr>
                    <td>${flat.id}</td>
                    <td><input type="number" id="prev${i}" value="${flat.prev}" oninput="calcRow(${i})"></td>
                    <td><input type="number" id="rent${i}" value="${flat.rent}" oninput="calcRow(${i})"></td>
                    <td><input type="number" id="bill${i}" value="${flat.bill}" oninput="calcRow(${i})"></td>
                    <td><input type="number" id="oth${i}" value="0" oninput="calcRow(${i})"></td>
                    <td id="totalPowna${i}">0</td>
                    <td><input type="number" id="paid${i}" value="0" oninput="calcRow(${i})" style="border: 2px solid #1a73e8;"></td>
                    <td id="balance${i}" style="font-weight:bold;">0</td>
                </tr>`;
                body.innerHTML += row;
                calcRow(i);
            });
        }

        function calcRow(i) {
            const p = parseFloat(document.getElementById(`prev${i}`).value) || 0;
            const r = parseFloat(document.getElementById(`rent${i}`).value) || 0;
            const b = parseFloat(document.getElementById(`bill${i}`).value) || 0;
            const o = parseFloat(document.getElementById(`oth${i}`).value) || 0;
            const paid = parseFloat(document.getElementById(`paid${i}`).value) || 0;

            const tp = p + r + b + o;
            const bal = tp - paid;

            document.getElementById(`totalPowna${i}`).innerText = tp;
            document.getElementById(`balance${i}`).innerText = bal;
            calcFinal();
        }

        function calcFinal() {
            let totalPaid = 0;
            for(let i=0; i<14; i++) {
                totalPaid += parseFloat(document.getElementById(`paid${i}`).value) || 0;
            }
            const expenses = (parseFloat(document.getElementById('expGuard').value) || 0) +
                             (parseFloat(document.getElementById('expMosque').value) || 0) +
                             (parseFloat(document.getElementById('expRepair').value) || 0);
            
            document.getElementById('finalTurnover').innerText = totalPaid - expenses;
        }

        function exportData() {
            const month = document.getElementById('reportMonth').value;
            let csvContent = "data:text/csv;charset=utf-8,Flat,PrevDue,Rent,Bills,Others,TotalPowna,Paid,Balance\n";
            for(let i=0; i<14; i++) {
                const rowData = [
                    i+1,
                    document.getElementById(`prev${i}`).value,
                    document.getElementById(`rent${i}`).value,
                    document.getElementById(`bill${i}`).value,
                    document.getElementById(`oth${i}`).value,
                    document.getElementById(`totalPowna${i}`).innerText,
                    document.getElementById(`paid${i}`).value,
                    document.getElementById(`balance${i}`).innerText
                ];
                csvContent += rowData.join(",") + "\n";
            }
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Rent_Report_${month}.csv`);
            document.body.appendChild(link);
            link.click();
        }

        initTable();
    </script>
</body>
</html>
